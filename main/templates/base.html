{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.6.0/css/all.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css"/>
 {% block extra_css %}{% endblock %}
</head>

<body>
<aside>
    <img src="{% static 'main/img/bird.svg' %}" alt="Лого">
    <span class="logo">
        <span class="highlight">E</span>mbird<span class="highlight">P</span>rojects
    </span>

    <ul>
        <!-- Кнопка Портфолио -->
        <a href="/" class="active">
            <li><i class="fa-solid fa-star"></i> Портфолио</li>
        </a>

        <!-- Кнопка Заказать вышивку, которая ведет на страницу с формой -->
        <li>
            <a href="{% url 'order_form' %}" class="cta-button">
                <i class="fa fa-pencil-alt"></i> Заказать вышивку
            </a>
        </li>

        <!-- Блок быстрых контактов -->
        <div class="contact-block">
            <a href="https://t.me/Cart00nTG" target="_blank" class="contact-link">
                <i class="fa-solid fa-paper-plane"></i> Telegram
            </a>
        </div>

        <a href="#">
            <li><i class="fa-solid fa-handshake"></i> Сотрудничество</li>
        </a>
        <a href="#">
            <li><i class="fa-solid fa-pen"></i> Отзывы</li>
        </a>
    </ul>
</aside>

{% block content %}{% endblock %}



<!-- Подключаем JS для анимаций -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init(); // Инициализация анимаций
</script>

<!-- Подключение внешнего JavaScript файла -->
<script src="{% static 'main/js/main.js' %}"></script>

<script>
    AOS.init({
        duration: 1000,  // Длительность анимации (1 секунда)
        delay: 0,        // Задержка перед началом анимации
        once: true       // Анимация выполняется только один раз при скролле
    });
</script>

 {% block extra_js %}{% endblock %}
</body>
</html>
